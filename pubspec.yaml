name: dart_xcodeproj
description: >-
  Dart library for parsing and working with Xcode projects. Manipulates
  .xcodeproj, .xcworkspace, .xcscheme, and .xcconfig files. Pure Dart,
  cross-platform (macOS, Windows, Linux), zero native code.
version: 0.1.0
repository: https://github.com/AngeloAvv/dart_xcodeproj
homepage: https://github.com/AngeloAvv/dart_xcodeproj

topics:
  - xcode
  - ios
  - macos
  - xcodeproj

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  propertylistserialization: ^1.4.1
  crypto: ^3.0.7
  path: ^1.9.1
  xml: ^6.6.1
  args: '>=2.4.2 <3.0.0'
  mason_logger: ^0.3.3
  yaml_writer: ^2.1.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
